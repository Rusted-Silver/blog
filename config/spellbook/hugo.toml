baseURL = "https://ag2s.ca/spellbook"
contentDir = "content/spellbook"
publishDir = "public/spellbook"
languageCode = 'en-us'
title = "SpellBook"
theme = "hugo-book"

refLinksErrorLevel = "WARNING"

[module]
  [[module.mounts]]
    source = 'content/spellbook'
    target = 'content'
    excludeFiles = ['images/*']

[params]
  BookSection = '*'
  BookComments = false
  BookTheme = 'dark'

[menu]
  [[menu.before]]
    name = "<- Back to main page"
    url = "https://ag2s.ca/"
  [[menu.before]]
    name = "Welcome!"
    url = "/"
